

services:
  db:
    image: postgres:15
    container_name: bank_rest_db
    environment:
      POSTGRES_DB: bank_rest_db
      POSTGRES_USER: hudoyor
      POSTGRES_PASSWORD: root
    ports:
      - "5442:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: bank_rest_app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/bank_rest_db
      SPRING_DATASOURCE_USERNAME: hudoyor
      SPRING_DATASOURCE_PASSWORD: root

volumes:
  postgres_data: