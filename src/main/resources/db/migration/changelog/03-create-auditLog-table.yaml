databaseChangeLog:
  - changeSet:
      id: 3
      author: hudoyor
      changes:
        - createTable:
            tableName: audit_logs
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT

              - column:
                  name: action
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: entity_type
                  type: VARCHAR(50)

              - column:
                  name: entity_id
                  type: BIGINT

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP