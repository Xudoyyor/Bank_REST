databaseChangeLog:
  - changeSet:
      id: 4
      author: hudoyor
      changes:
        - createTable:
            tableName: transactions
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: from_card_id
                  type: BIGINT

              - column:
                  name: to_card_id
                  type: BIGINT

              - column:
                  name: amount
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(20)

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP