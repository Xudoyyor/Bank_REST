databaseChangeLog:
  - changeSet:
      id: 2
      author: hudoyor
      changes:
        - createTable:
            tableName: cards
            columns:

              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: card_number
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: masked_number
                  type: VARCHAR(20)

              - column:
                  name: owner_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: expiration_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: cvv_hash
                  type: VARCHAR(255)

              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: balance
                  type: DECIMAL(15,2)
                  defaultValueNumeric: 0

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_card_user
                    referencedTableName: users
                    referencedColumnNames: id

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: updated_at
                  type: TIMESTAMP

              - column:
                  name: blocked_at
                  type: TIMESTAMP

              - column:
                  name: blocked_by
                  type: BIGINT

              - column:
                  name: is_deleted
                  type: BOOLEAN
                  defaultValueBoolean: false